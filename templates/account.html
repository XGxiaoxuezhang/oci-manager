{% extends "base.html" %}

{% block title %}账户设置 | OCI Manager{% endblock %}
{% block hero_title %}账户设置{% endblock %}
{% block hero_text %}修改登录密码。{% endblock %}

{% block content %}
<div class="grid grid-2">
  <section class="panel">
    <h3>修改密码</h3>
    <form method="post" action="/account/password" autocomplete="off">
      <div class="field">
        <label>当前密码</label>
        <input name="current_password" type="password" autocomplete="current-password" required>
      </div>
      <div class="field">
        <label>新密码（至少 8 位）</label>
        <input name="new_password" type="password" autocomplete="new-password" minlength="8" required>
      </div>
      <div class="field">
        <label>确认新密码</label>
        <input name="confirm_password" type="password" autocomplete="new-password" minlength="8" required>
      </div>
      <button class="btn btn-primary" type="submit">更新密码</button>
    </form>
  </section>
  <section class="panel">
    <h3>当前会话</h3>
    <div class="meta-list">
      <div class="meta-row"><span>登录用户</span><span>{{ current_user }}</span></div>
    </div>
  </section>
</div>
{% endblock %}
